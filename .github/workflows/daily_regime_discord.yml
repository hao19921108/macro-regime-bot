name: Daily Regime Discord

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-regime:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regime classifier
        run: python regime_classifier.py | tee daily_regime_output.txt

      - name: Extract Discord summary
        run: |
          awk '/^=== DISCORD SUMMARY ===/{found=1} found' daily_regime_output.txt > discord_summary.txt
          test -s discord_summary.txt
          cat discord_summary.txt

      - name: Send Discord message
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          test -n "$DISCORD_WEBHOOK" || {
            echo "DISCORD_WEBHOOK secret is not configured"
            exit 1
          }

          CONTENT=$(python - <<'PY'
          import json
          from pathlib import Path

          summary = Path("discord_summary.txt").read_text(encoding="utf-8").strip()
          print(json.dumps({"content": f"```text\n{summary[:1800]}\n```"}))
          PY
          )

          curl --fail-with-body \
            -H "Content-Type: application/json" \
            -H "User-Agent: macro-regime-bot/1.0 GitHubActions" \
            -X POST \
            -d "$CONTENT" \
            "$DISCORD_WEBHOOK"
