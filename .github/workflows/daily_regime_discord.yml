name: Daily Regime Discord

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  daily-regime:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regime classifier
        run: python regime_classifier.py | tee daily_regime_output.txt

      - name: Extract Discord summary
        run: |
          awk '/^=== DISCORD SUMMARY ===/{found=1} found' daily_regime_output.txt > discord_summary.txt
          test -s discord_summary.txt
          cat discord_summary.txt

      - name: Send Discord message
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python - <<'PY'
          import json, os, sys, urllib.request, urllib.error

          webhook = os.environ.get("DISCORD_WEBHOOK")
          if not webhook:
              sys.exit("Missing DISCORD_WEBHOOK")

          with open("discord_summary.txt", "r", encoding="utf-8") as f:
              summary = f.read().strip()

          if len(summary) > 1800:
              summary = summary[:1800] + "\n...[truncated]"

          payload = json.dumps({
              "content": f"```text\n{summary}\n```"
          }).encode("utf-8")

          req = urllib.request.Request(
              webhook,
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "Macro-Bot/1.0"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  print("Sent:", r.status)
          except urllib.error.HTTPError as e:
              print("HTTP error:", e.code)
              print(e.read().decode())
              sys.exit(1)
          except urllib.error.URLError as e:
              print("Request failed:", e.reason)
              sys.exit(1)
          PY
