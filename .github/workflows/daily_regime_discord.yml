name: Daily Regime Discord

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  daily-regime:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regime classifier
        run: python regime_classifier.py | tee daily_regime_output.txt

      - name: Extract Discord summary
        run: |
          awk '/^=== DISCORD SUMMARY ===/{found=1} found' daily_regime_output.txt > discord_summary.txt
          test -s discord_summary.txt
          cat discord_summary.txt

      - name: Send summary to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          test -n "$DISCORD_WEBHOOK" || {
            echo "DISCORD_WEBHOOK secret is not configured"
            exit 1
          }

          python - <<'PY'
          import json

          with open("discord_summary.txt", "r", encoding="utf-8") as handle:
              summary = handle.read().strip()

          with open("discord_payload.json", "w", encoding="utf-8") as handle:
              json.dump({"content": f"```text\n{summary}\n```"}, handle)
          PY

          curl --fail-with-body --silent --show-error \
            -H "Content-Type: application/json" \
            -H "User-Agent: macro-regime-bot-github-actions/1.0" \
            --data @discord_payload.json \
            "$DISCORD_WEBHOOK"
